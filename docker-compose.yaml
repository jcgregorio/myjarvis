# Single consolidated stack: myjarvis + its voice dependencies + Home Assistant.
# Project name is pinned to "homeassistant" so the existing running HA/Z-Wave/
# Matter containers (created under that project) are adopted in place rather
# than orphaned. Previously split across:
#   - /home/jcgregorio/myjarvis/docker-compose.yaml            (myjarvis)
#   - jcgregorio/homeassistant/docker-compose.yaml             (whisper/ollama/piper/mosquitto)
#   - jcgregorio/homeassistant/docker-compose-homeassistant.yaml (HA stack)
name: homeassistant

services:
  myjarvis:
    build: .
    container_name: myjarvis
    restart: unless-stopped
    network_mode: host
    depends_on:
      - faster-whisper
      - mosquitto
      - piper
    env_file:
      - /home/jcgregorio/jcgregorio/myjarvis-secret/myjarvis.env
    environment:
      - OLLAMA_URL=http://192.168.1.145:11434/v1
      - WHISPER_URL=http://localhost:8000
      - MODEL=granite4:latest
      - MQTT_BROKER=mqtt://localhost:1883
      - PIPER_ADDR=localhost:10200
      - AUDIO_PORT=8085
      - OBSIDIAN_REPO=/obsidian
      - DEBUG_AUDIO_DIR=/debug-audio
    volumes:
      - /home/jcgregorio/obsidian:/obsidian
      - /home/jcgregorio/.gitconfig:/root/.gitconfig:ro
      - /home/jcgregorio/.config/gh:/root/.config/gh:ro
      - /home/jcgregorio/jarvis-debug-audio:/debug-audio

  faster-whisper:
    image: fedirz/faster-whisper-server:latest-cuda
    container_name: jarvis-whisper
    ports:
      - "8000:8000"
    environment:
      - WHISPER__MODEL=small
      - WHISPER__DEVICE=cuda
      - WHISPER__TTL=-1
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities:
                - gpu

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - 11434:11434
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - OLLAMA_KEEP_ALIVE=-1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  piper:
    image: rhasspy/wyoming-piper:latest
    container_name: jarvis-piper
    ports:
      - "10200:10200"
    volumes:
      - piper_data:/data
    command: --voice en_US-hfc_male-medium
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    restart: unless-stopped

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:2026.2.3
    container_name: homeassistant
    # host network is required for mDNS/device discovery (Chromecast, etc.)
    network_mode: host
    privileged: true
    environment:
      - TZ=America/New_York
    volumes:
      - /home/jcgregorio/homeassistant/config:/config
      - /run/dbus:/run/dbus:ro
    restart: unless-stopped

  matter-server:
    image: ghcr.io/home-assistant-libs/python-matter-server:stable
    container_name: matter-server
    # host network required for Matter mDNS/BLE device discovery
    network_mode: host
    volumes:
      - /home/jcgregorio/homeassistant/matter:/data
      - /run/dbus:/run/dbus:ro
    restart: unless-stopped

  zwave-js:
    image: zwavejs/zwave-js-ui:latest
    container_name: zwave-js
    environment:
      - TZ=America/New_York
    volumes:
      - /home/jcgregorio/homeassistant/zwave:/usr/src/app/store
    ports:
      - "8091:8091"   # Z-Wave JS UI web interface
      - "3000:3000"   # WebSocket for HA integration
    devices:
      - /dev/ttyACM0:/dev/ttyACM0
    restart: unless-stopped

  matterbridge:
    image: luligu/matterbridge:latest
    container_name: matterbridge
    network_mode: host
    volumes:
      - /home/jcgregorio/homeassistant/matterbridge:/root/Matterbridge
      - /home/jcgregorio/homeassistant/matterbridge-config:/root/.matterbridge
      - /home/jcgregorio/homeassistant/mattercert:/root/.mattercert
    restart: unless-stopped

  vscode:
    image: lscr.io/linuxserver/code-server:latest
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - DEFAULT_WORKSPACE=/config
      # Set a password, or remove PASSWORD and use HASHED_PASSWORD instead
      - PASSWORD=homeassistant
    container_name: vscode
    volumes:
      - /home/jcgregorio/homeassistant/config:/config
      - /home/jcgregorio/homeassistant/vscode:/config/.config
    ports:
      - "8080:8443"
    restart: unless-stopped

volumes:
  ollama_data:
  piper_data:
